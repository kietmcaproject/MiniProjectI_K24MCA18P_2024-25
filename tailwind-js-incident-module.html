<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report Module</title>
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animation classes */
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        .slide-out {
            animation: slideOut 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <!-- Main Container -->
    <div class="max-w-2xl mx-auto space-y-4">
        <!-- Initial Button -->
        <button id="showFormBtn" class="w-full bg-red-500 hover:bg-red-600 text-white p-4 rounded-lg shadow-lg 
            transition-all duration-300 hover:shadow-xl transform hover:-translate-y-1">
            📢 Report New Incident
        </button>

        <!-- Form Container (Initially Hidden) 
        <div id="formContainer" class="hidden bg-white rounded-lg shadow-xl">
            <!-- Form Header 
            <div class="bg-gradient-to-r from-red-500 to-red-600 p-4 rounded-t-lg">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl text-white font-bold">Report an Incident</h2>
                    <button id="closeFormBtn" class="text-white hover:text-red-200">✕</button>
                </div>
            </div>-->

            <!-- Form Content -->
            <form id="incidentForm" class="p-6 space-y-6">
                <!-- Status Banner (Hidden by default) -->
                <div id="statusBanner" class="hidden p-4 rounded-lg"></div>

                <!-- Priority Selection -->
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium block">Priority Level</label>
                    <div class="flex space-x-4" id="priorityBtns">
                        <button type="button" data-priority="low" 
                            class="priority-btn px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-green-500 focus:outline-none">
                          Low
                         </button>
                        <button type="button" data-priority="medium" 
                            class="priority-btn px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-yellow-500 focus:outline-none">
                            Medium
                        </button>
                        <button type="button" data-priority="high" 
                            class="priority-btn px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-red-500 focus:outline-none">
                            High
                    </button>
                    </div>
                </div>

                <!-- Incident Type -->
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium block">Incident Type</label>
                    <select id="incidentType" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500" required>
                        <option value="">Select Type...</option>
                        <option value="security">Security Breach</option>
                        <option value="system">System Outage</option>
                        <option value="network">Network Issues</option>
                        <option value="hardware">Hardware Failure</option>
                        <option value="software">Software Bug</option>
                    </select>
                </div>

                <!-- Location -->
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium block">Location/Department</label>
                    <input type="text" id="location" 
                        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500" 
                        placeholder="Enter location or department" required>
                </div>

                <!-- Description -->
                <div class="space-y-2">
                    <label class="text-gray-700 font-medium block">Description</label>
                    <div class="relative">
                        <textarea id="description" 
                            class="w-full p-3 border rounded-lg h-32 focus:ring-2 focus:ring-red-500 focus:border-red-500" 
                            placeholder="Describe the incident in detail..." 
                            maxlength="500" required></textarea>
                        <div id="charCount" class="absolute bottom-2 right-2 text-sm text-gray-500">
                            500 characters left
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex justify-end space-x-4">
                    <button type="button" id="cancelBtn" 
                        class="px-6 py-2 border rounded-lg hover:bg-gray-100 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" 
                        class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
                        Submit Report
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // DOM Elements
        const showFormBtn = document.getElementById('showFormBtn');
        const formContainer = document.getElementById('formContainer');
        const closeFormBtn = document.getElementById('closeFormBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const incidentForm = document.getElementById('incidentForm');
        const description = document.getElementById('description');
        const charCount = document.getElementById('charCount');
        const statusBanner = document.getElementById('statusBanner');
        const priorityBtns = document.querySelectorAll('.priority-btn');

        // Form State
        let selectedPriority = '';

        // Toggle Form Visibility
        function toggleForm(show) {
            if (show) {
                formContainer.classList.remove('hidden');
                formContainer.classList.add('slide-in');
                showFormBtn.classList.add('hidden');
            } else {
                formContainer.classList.add('slide-out');
                setTimeout(() => {
                    formContainer.classList.add('hidden');
                    formContainer.classList.remove('slide-out');
                    showFormBtn.classList.remove('hidden');
                    resetForm();
                }, 300);
            }
        }

        // Update Character Count
        function updateCharCount() {
            const remaining = 500 - description.value.length;
            charCount.textContent = `${remaining} characters left`;
            
            if (remaining < 50) {
                charCount.classList.add('text-red-500');
                charCount.classList.remove('text-gray-500');
            } else {
                charCount.classList.remove('text-red-500');
                charCount.classList.add('text-gray-500');
            }
        }

        // Show Status Banner
        function showStatus(message, type) {
            statusBanner.textContent = message;
            statusBanner.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'text-green-800', 'text-red-800');
            
            if (type === 'success') {
                statusBanner.classList.add('bg-green-100', 'text-green-800');
            } else {
                statusBanner.classList.add('bg-red-100', 'text-red-800');
            }

            statusBanner.classList.add('slide-in');
        }

        // Reset Form
        function resetForm() {
            incidentForm.reset();
            updateCharCount();
            statusBanner.classList.add('hidden');
            priorityBtns.forEach(btn => {
                btn.classList.remove('border-green-500', 'border-yellow-500', 'border-red-500',
                                  'bg-green-50', 'bg-yellow-50', 'bg-red-50');
            });
            selectedPriority = '';
        }

        // Event Listeners
        showFormBtn.addEventListener('click', () => toggleForm(true));
        closeFormBtn.addEventListener('click', () => toggleForm(false));
        cancelBtn.addEventListener('click', () => toggleForm(false));
        description.addEventListener('input', updateCharCount);

        // Priority Button Handlers
        priorityBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const priority = e.target.dataset.priority;
                selectedPriority = priority;
                
                // Reset all buttons
                priorityBtns.forEach(b => {
                    b.classList.remove('border-green-500', 'border-yellow-500', 'border-red-500',
                                    'bg-green-50', 'bg-yellow-50', 'bg-red-50');
                });
                
                // Style selected button
                switch(priority) {
                    case 'low':
                        btn.classList.add('border-green-500', 'bg-green-50');
                        break;
                    case 'medium':
                        btn.classList.add('border-yellow-500', 'bg-yellow-50');
                        break;
                    case 'high':
                        btn.classList.add('border-red-500', 'bg-red-50');
                        break;
                }
            });
        });

        // Form Submission
        incidentForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (!selectedPriority) {
                showStatus('Please select a priority level', 'error');
                document.getElementById('priorityBtns').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('priorityBtns').classList.remove('shake');
                }, 500);
                return;
            }

            const formData = {
                priority: selectedPriority,
                type: document.getElementById('incidentType').value,
                location: document.getElementById('location').value,
                description: description.value
            };

            console.log('Incident Report:', formData);
            
            showStatus('Incident report submitted successfully!', 'success');
            
            setTimeout(() => {
                toggleForm(false);
            }, 2000);
        });
    </script>
            <form action="incident-database.php" method="POST" data-aos="fade-up">

</body>
</html>
